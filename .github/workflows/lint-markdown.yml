name: AIGOV - Lint Markdown

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint markdown docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            AGENTS.md
            CLAUDE.md
            GEMINI.md
            .github/copilot-instructions.md
          config: .markdownlint.json
